<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Academic GPA Calculator</title>
</head>
<body class="bg-slate-50 py-10">
    <div class="max-w-lg mx-auto bg-white p-8 rounded-3xl shadow-xl">
        <h1 class="text-2xl font-bold text-emerald-900 mb-6">Student Report Entry</h1>
        <form method="POST">
            <input type="text" name="name" placeholder="Student Name" required class="w-full p-3 border mb-3 rounded-xl">
            <input type="text" name="class" placeholder="Class/Grade" required class="w-full p-3 border mb-6 rounded-xl">
            
            <label class="block text-sm font-bold text-slate-600 mb-2">Select Grading System</label>
            <select name="system" class="w-full p-3 border mb-6 rounded-xl">
            <option value="Standard">Standard Letter (A+, A, B...)</option>
            <option value="IB">IB (1-7)</option>
            <option value="AP">AP (1-5)</option>
            <option value="IGCSE">IGCSE (9-1)</option>
            <option value="A-Level">A-Level (A*-E)</option>
            </select>
            
            <div id="subject-container" class="space-y-3">
                <div class="flex gap-2">
                    <input type="text" name="subject" placeholder="Subject" required class="w-full p-2 border rounded-lg">
                    <input type="text" name="grade" placeholder="Grade" required class="w-24 p-2 border rounded-lg">
                </div>
            </div>
            
            <button type="button" onclick="addSubject()" class="mt-4 text-emerald-600 font-semibold text-sm">+ Add Another Subject</button>
            <button type="submit" class="w-full mt-8 bg-emerald-600 text-white py-3 rounded-2xl font-bold">Generate GPA Report</button>
        </form>
    </div>

    <script>
        function addSubject() {
            const container = document.getElementById('subject-container');
            const newRow = document.createElement('div');
            newRow.className = 'flex gap-2';
            newRow.innerHTML = `
                <input type="text" name="subject" placeholder="Subject" required class="w-full p-2 border rounded-lg">
                <input type="text" name="grade" placeholder="Grade" required class="w-24 p-2 border rounded-lg">
            `;
            container.appendChild(newRow);
        }
    </script>
</body>
</html>
